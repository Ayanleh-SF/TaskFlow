services:
  - type: web
    name: taskflow-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REQUIRE_EMAIL_CONFIRMATION
        value: "false"
      - key: ACCESS_EXPIRE_MIN
        value: "15"
      - key: REFRESH_EXPIRE_DAYS
        value: "7"
